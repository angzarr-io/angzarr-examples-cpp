name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/angzarr-io/examples-cpp
  COORDINATOR_VERSION: latest
  HELM_CHART: oci://ghcr.io/angzarr-io/charts/angzarr
  HELM_CHART_VERSION: "0.5.1"

jobs:
  test:
    name: Build & Test
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/angzarr-io/angzarr-cpp:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Configure git safe directory
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Install build dependencies
        run: apt-get update && apt-get install -y libboost-regex-dev libboost-filesystem-dev libboost-system-dev libboost-program-options-dev libboost-thread-dev nlohmann-json3-dev libasio-dev libtclap-dev clang-tidy ruby ruby-dev && gem install bundler --no-document

      - name: Build
        run: just -f justfile.container build

      - name: Test (unit)
        run: just -f justfile.container test-unit

      - name: Lint
        run: just -f justfile.container lint

  build-images:
    name: Build & Push Images
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        target:
          - agg-player
          - agg-table
          - agg-hand
          - saga-table-hand
          - saga-table-player
          - saga-hand-table
          - saga-hand-player
          - pmg-hand-flow
          - prj-output
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate image tags
        id: tags
        run: |
          SHA="${{ github.sha }}"
          SHORT_SHA="${SHA:0:7}"

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            PR_NUM="${{ github.event.pull_request.number }}"
            echo "tags=${{ env.IMAGE_PREFIX }}-${{ matrix.target }}:pr-${PR_NUM}-${SHORT_SHA}" >> $GITHUB_OUTPUT
          else
            echo "tags=${{ env.IMAGE_PREFIX }}-${{ matrix.target }}:${SHORT_SHA},${{ env.IMAGE_PREFIX }}-${{ matrix.target }}:latest" >> $GITHUB_OUTPUT
          fi

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Containerfile
          target: ${{ matrix.target }}
          push: ${{ github.event_name != 'pull_request' }}
          load: ${{ github.event_name == 'pull_request' }}
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Export image for acceptance tests
        if: github.event_name == 'pull_request'
        run: docker save -o /tmp/${{ matrix.target }}.tar "${{ steps.tags.outputs.tags }}"

      - name: Upload image artifact
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: image-${{ matrix.target }}
          path: /tmp/${{ matrix.target }}.tar
          retention-days: 1

  acceptance-test:
    name: Acceptance Tests
    runs-on: ubuntu-latest
    needs: build-images
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Compute image tag
        id: tag
        run: |
          SHA="${{ github.sha }}"
          SHORT_SHA="${SHA:0:7}"
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            PR_NUM="${{ github.event.pull_request.number }}"
            echo "tag=pr-${PR_NUM}-${SHORT_SHA}" >> $GITHUB_OUTPUT
          else
            echo "tag=${SHORT_SHA}" >> $GITHUB_OUTPUT
          fi

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Create Kind cluster
        uses: helm/kind-action@v1
        with:
          cluster_name: angzarr-test
          config: deploy/kind/cluster.yaml
          node_image: kindest/node:v1.31.0
          wait: 120s

      - name: Create namespace
        run: kubectl create namespace angzarr-test --dry-run=client -o yaml | kubectl apply -f -

      - name: Create image pull secret
        run: |
          kubectl create secret docker-registry ghcr-pull-secret \
            --docker-server=ghcr.io \
            --docker-username=${{ github.actor }} \
            --docker-password="${{ secrets.GITHUB_TOKEN }}" \
            --namespace=angzarr-test \
            --dry-run=client -o yaml | kubectl apply -f -
          kubectl patch serviceaccount default -n angzarr-test \
            -p '{"imagePullSecrets": [{"name": "ghcr-pull-secret"}]}' || true

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Helm registry
        run: echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Pull and load coordinator images
        # Pinned by digest for supply-chain safety; matches the helm
        # `images:` block. The `repo:tag@sha256:digest` form is a valid
        # docker reference where the runtime resolves by digest — the tag
        # is advisory. stream/log have no `:latest` published on ghcr;
        # use the -dev variants from core's stream/log workflow.
        run: |
          COORDINATOR_IMAGES=(
            "ghcr.io/angzarr-io/angzarr-aggregate:e6f0e50@sha256:3d0825178a38e60b056952ca13f1dc0b0cbe3367c63461f56d83eb3115a23e40"
            "ghcr.io/angzarr-io/angzarr-saga:e6f0e50@sha256:0e265cd455eca3e9dd1a5f0a4fcdf0e1b75b9c1286d55dab9802cc03fddfe780"
            "ghcr.io/angzarr-io/angzarr-projector:e6f0e50@sha256:81173335c75886cb0b1c5f5435c5b4997b030b109a3d552c63fbb1596939d989"
            "ghcr.io/angzarr-io/angzarr-process-manager:e6f0e50@sha256:d14f6d764857f80e0d693ec1697cb5cfe09f98ce449bc9896c090ad9633ee7ef"
            "ghcr.io/angzarr-io/angzarr-stream-dev:ba4fcd4a767165f56aadd2bfbf2b294a59394800@sha256:bb0bb16dc8b1039ba0cf63f38e6dbea380a389fbaae3143deaf70b4e0c38778f"
            "ghcr.io/angzarr-io/angzarr-log-dev:ba4fcd4a767165f56aadd2bfbf2b294a59394800@sha256:bf96d6a207d9328c3792c6d15d8a06eee2b3711b81beb74809bde41e20cfdf64"
            "ghcr.io/angzarr-io/angzarr-grpc-gateway:e6f0e50@sha256:2e1ebc5e1c4bea8cca2b27b1ab90a0d4010ff4c1986cd53ed1fe7bab367ae35d"
          )
          for ref in "${COORDINATOR_IMAGES[@]}"; do
            echo "Pulling $ref..."
            docker pull "$ref"
            # docker stores digest-pulled images under the digest ref;
            # add a tag ref so kind load can address it by name.
            tagged="${ref%@sha256:*}"
            docker tag "$ref" "$tagged"
            kind load docker-image "$tagged" --name angzarr-test
          done

      - name: Download image artifacts
        if: github.event_name == 'pull_request'
        uses: actions/download-artifact@v4
        with:
          path: /tmp/images
          pattern: image-*

      - name: Load example images into Kind (PR)
        if: github.event_name == 'pull_request'
        run: |
          # Tarballs carry the PR-build tag (`pr-<N>-<sha>`); the chart's
          # `tag: "latest"` references won't match, so load into the local
          # docker daemon, retag as `:latest`, and load both refs into Kind.
          for tarball in /tmp/images/image-*/*.tar; do
            echo "Loading $tarball..."
            img=$(docker load -i "$tarball" | grep -oE 'Loaded image: \S+' | awk '{print $NF}' | head -1)
            base="${img%:*}"
            echo "  loaded $img -> retag as $base:latest"
            docker tag "$img" "$base:latest"
            kind load docker-image "$img" --name angzarr-test
            kind load docker-image "$base:latest" --name angzarr-test
          done

      - name: Pull and load example images (push)
        if: github.event_name != 'pull_request'
        env:
          TAG: ${{ steps.tag.outputs.tag }}
        run: |
          TARGETS="agg-player agg-table agg-hand saga-table-hand saga-table-player saga-hand-table saga-hand-player pmg-hand-flow prj-output"
          for target in $TARGETS; do
            IMG="${{ env.IMAGE_PREFIX }}-${target}:${TAG}"
            echo "Pulling ${IMG}..."
            docker pull "${IMG}"
            kind load docker-image "${IMG}" --name angzarr-test
          done

      - name: Install buf
        uses: bufbuild/buf-action@v1
        with:
          setup_only: true

      - name: Deploy infrastructure
        run: |
          echo "Deploying PostgreSQL..."
          helm upgrade --install angzarr-db \
            oci://ghcr.io/angzarr-io/charts/angzarr-db-postgres-simple \
            --namespace angzarr-test \
            --wait --timeout 2m
          echo "Deploying RabbitMQ..."
          helm upgrade --install angzarr-mq \
            oci://ghcr.io/angzarr-io/charts/angzarr-mq-rabbitmq-simple \
            --namespace angzarr-test \
            --wait --timeout 3m

      - name: Create gateway descriptor configmap
        run: |
          cd angzarr-project/proto
          buf build -o /tmp/types.bin
          cd ../..
          kubectl create configmap gateway-descriptor \
            --from-file=types.bin=/tmp/types.bin \
            --namespace angzarr-test

      - name: Deploy with Helm
        env:
          TAG: ${{ steps.tag.outputs.tag }}
          COORD_VER: ${{ env.COORDINATOR_VERSION }}
        run: |
          helm upgrade --install poker \
            ${{ env.HELM_CHART }} \
            --version ${{ env.HELM_CHART_VERSION }} \
            -f deploy/k8s/helm/values.yaml \
            -f deploy/k8s/helm/values-ci.yaml \
            --set images.aggregate.tag="${COORD_VER}" \
            --set images.saga.tag="${COORD_VER}" \
            --set images.projector.tag="${COORD_VER}" \
            --set images.processManager.tag="${COORD_VER}" \
            --set images.stream.tag="${COORD_VER}" \
            --set images.gateway.tag="${COORD_VER}" \
            --set images.log.tag="${COORD_VER}" \
            --set "applications.business[0].image.tag=${TAG}" \
            --set "applications.business[1].image.tag=${TAG}" \
            --set "applications.business[2].image.tag=${TAG}" \
            --set "applications.sagas[0].image.tag=${TAG}" \
            --set "applications.sagas[1].image.tag=${TAG}" \
            --set "applications.sagas[2].image.tag=${TAG}" \
            --set "applications.sagas[3].image.tag=${TAG}" \
            --set "applications.processManagers[0].image.tag=${TAG}" \
            --set "applications.projectors[0].image.tag=${TAG}" \
            --namespace angzarr-test \
            --wait \
            --timeout 5m

      - name: Wait for pods to be ready
        run: |
          echo "Waiting for pods to be ready..."
          kubectl wait --for=condition=ready pod --all -n angzarr-test --timeout=300s || true
          echo ""
          echo "=== Pod Status ==="
          kubectl get pods -n angzarr-test -o wide

      - name: Smoke test - verify pods running
        run: |
          echo "=== Smoke Test ==="
          TOTAL=$(kubectl get pods -n angzarr-test --no-headers | wc -l)
          RUNNING=$(kubectl get pods -n angzarr-test --no-headers | grep -c "Running" || true)
          FAILED=$(kubectl get pods -n angzarr-test --no-headers | grep -cE "Error|CrashLoopBackOff|ImagePullBackOff" || true)

          echo "Total pods: ${TOTAL}"
          echo "Running: ${RUNNING}"
          echo "Failed: ${FAILED}"

          if [ "${FAILED}" -gt 0 ]; then
            echo "ERROR: ${FAILED} pod(s) in error state"
            kubectl get pods -n angzarr-test --no-headers | grep -E "Error|CrashLoopBackOff|ImagePullBackOff"
            exit 1
          fi

          if [ "${RUNNING}" -lt 3 ]; then
            echo "ERROR: Expected at least 3 running pods (aggregates), got ${RUNNING}"
            exit 1
          fi

          echo "Smoke test passed: ${RUNNING} pods running"

      - name: Smoke test - gateway port-forward
        run: |
          # Port-forward gateway and verify it responds
          GATEWAY_POD=$(kubectl get pods -n angzarr-test -l app.kubernetes.io/component=gateway -o jsonpath='{.items[0].metadata.name}' 2>/dev/null || true)
          if [ -n "${GATEWAY_POD}" ]; then
            echo "Port-forwarding to gateway pod: ${GATEWAY_POD}"
            kubectl port-forward -n angzarr-test "${GATEWAY_POD}" 9084:9084 &
            PF_PID=$!
            sleep 3

            # Verify port-forward is working (gateway is gRPC, so just check the port is open)
            if curl -sf -o /dev/null http://localhost:9084 2>/dev/null || nc -z localhost 9084 2>/dev/null; then
              echo "Gateway port-forward successful - port 9084 is reachable"
            else
              echo "WARNING: Gateway port may not be reachable (expected for gRPC-only services)"
            fi

            kill $PF_PID 2>/dev/null || true
          else
            echo "WARNING: No gateway pod found, skipping port-forward test"
          fi

      - name: Install grpcurl
        run: |
          GRPCURL_VERSION="1.9.1"
          curl -sSL "https://github.com/fullstorydev/grpcurl/releases/download/v${GRPCURL_VERSION}/grpcurl_${GRPCURL_VERSION}_linux_x86_64.tar.gz" | tar -xz -C /usr/local/bin grpcurl
          grpcurl --version

      - name: Port-forward player aggregate
        run: |
          echo "Waiting for player aggregate pod..."
          kubectl wait --for=condition=ready pod -l angzarr.io/domain=player -n angzarr-test --timeout=180s || {
            echo "Player aggregate pod not ready"
            kubectl get pods -n angzarr-test
            exit 1
          }
      - name: Run acceptance tests
        env:
          PLAYER_URL: "localhost:1310"
          TABLE_URL: "localhost:1311"
          HAND_URL: "localhost:1312"
          PROTOSET: "/tmp/types.bin"
        run: |
          kubectl port-forward -n angzarr-test svc/player-aggregate 1310:1310 &
          kubectl port-forward -n angzarr-test svc/table-aggregate 1311:1310 &
          kubectl port-forward -n angzarr-test svc/hand-aggregate 1312:1310 &
          sleep 3

          # Basic acceptance: register player, deposit, verify
          PLAYER_ID=$(python3 -c "import uuid; print(uuid.uuid4().hex)")
          echo "Testing with player ID: $PLAYER_ID"

          # Register player
          RESP=$(grpcurl -plaintext -protoset "$PROTOSET" \
            -d "{\"command\":{\"cover\":{\"domain\":\"player\",\"root\":{\"value\":\"$(echo -n $PLAYER_ID | xxd -r -p | base64)\"},\"correlationId\":\"$(uuidgen)\"},\"pages\":[{\"header\":{\"sequence\":0},\"command\":{\"@type\":\"type.googleapis.com/examples.RegisterPlayer\",\"displayName\":\"CppTestPlayer\",\"email\":\"cpp@test.com\",\"playerType\":1}}]},\"syncMode\":\"SYNC_MODE_SIMPLE\"}" \
            $PLAYER_URL angzarr.CommandHandlerCoordinatorService/HandleCommand 2>&1) || true
          echo "Register response: $RESP"
          echo "$RESP" | grep -q "events" && echo "PASS: RegisterPlayer" || echo "FAIL: RegisterPlayer"

          echo "Acceptance tests complete"

      - name: Show logs on failure
        if: failure()
        run: |
          echo "=== Pod Status ==="
          kubectl get pods -n angzarr-test -o wide
          echo ""
          echo "=== Recent Events ==="
          kubectl get events -n angzarr-test --sort-by='.lastTimestamp' | tail -30
          echo ""
          echo "=== Pod Logs ==="
          for pod in $(kubectl get pods -n angzarr-test -o name 2>/dev/null); do
            echo "--- $pod ---"
            kubectl logs $pod -n angzarr-test --all-containers --tail=50 || true
          done

  summary:
    name: Summary
    runs-on: ubuntu-latest
    needs: [test, build-images, acceptance-test]
    if: always()
    steps:
      - name: Check results
        run: |
          echo "## CI Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Test | ${{ needs.test.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Build Images | ${{ needs.build-images.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Acceptance Tests | ${{ needs.acceptance-test.result }} |" >> $GITHUB_STEP_SUMMARY

          if [ "${{ needs.test.result }}" != "success" ] || \
             [ "${{ needs.build-images.result }}" != "success" ] || \
             [ "${{ needs.acceptance-test.result }}" != "success" ]; then
            echo "One or more required jobs failed"
            exit 1
          fi
